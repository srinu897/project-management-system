<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Management Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

.dashboard{
    display:flex;
    min-height:100vh;
}

/* Sidebar */

.sidebar{
    width:260px;
    background:#111827;
    padding:30px;
    position:fixed;
    height:100vh;
}

.logo{
    text-align:center;
    margin-bottom:40px;
}

.logo h2{
    color:#6366f1;
}

.menu{
    list-style:none;
}

.menu li{
    margin-bottom:15px;
}

.menu a{
    color:white;
    text-decoration:none;
    display:block;
    padding:14px;
    border-radius:12px;
    transition:.3s;
}

.menu a:hover{
    background:#6366f1;
}

/* Content */

.content{
    margin-left:260px;
    flex:1;
    padding:30px;
}

/* Top Bar */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.topbar h1{
    font-size:28px;
}

.profile{
    background:#1e293b;
    padding:10px 20px;
    border-radius:12px;
}

/* Stats Cards */

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:25px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h3{
    font-size:16px;
    color:#cbd5e1;
}

.card p{
    font-size:32px;
    margin-top:10px;
    font-weight:bold;
}

/* Form */

.project-form{
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    padding:25px;
    margin-bottom:30px;
}

.project-form h2{
    margin-bottom:20px;
}

.project-form form{
    display:grid;
    grid-template-columns:2fr 3fr 1fr auto;
    gap:15px;
}

.project-form input,
.project-form select{
    padding:12px;
    border:none;
    border-radius:12px;
    outline:none;
}

.project-form button{
    background:#6366f1;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:12px;
    cursor:pointer;
}

.project-form button:hover{
    background:#4f46e5;
}

/* Project Cards */

.project-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:20px;
}

.project-card{
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    padding:20px;
    transition:.3s;
}

.project-card:hover{
    transform:translateY(-5px);
}

.project-card h3{
    margin-bottom:10px;
}

.project-card p{
    color:#cbd5e1;
    margin-bottom:15px;
}

.status{
    display:inline-block;
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
}

.pending{
    background:#f59e0b;
}

.ongoing{
    background:#3b82f6;
}

.completed{
    background:#10b981;
}

.delete-btn{
    margin-top:15px;
    width:100%;
    padding:10px;
    background:#ef4444;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

.delete-btn:hover{
    background:#dc2626;
}

/* Mobile */

@media(max-width:768px){

.sidebar{
    width:100%;
    height:auto;
    position:relative;
}

.content{
    margin-left:0;
}

.project-form form{
    grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="dashboard">

```
<aside class="sidebar">

    <div class="logo">
        <h2>🚀 PMS</h2>
        <p>Project Management System</p>
    </div>

    <ul class="menu">
        <li><a href="#">📊 Dashboard</a></li>
        <li><a href="task.html">✅ Tasks</a></li>
        <li><a href="upload_document.html">📁 Documents</a></li>
        <li><a href="about.html">ℹ️ About</a></li>
    </ul>

</aside>

<main class="content">

    <div class="topbar">
        <h1>Project Dashboard</h1>
        <div class="profile">
            👤 Samala Srinivas
        </div>
    </div>

    <div class="stats">

        <div class="card">
            <h3>Total Projects</h3>
            <p id="totalProjects">0</p>
        </div>

        <div class="card">
            <h3>Pending</h3>
            <p id="pendingProjects">0</p>
        </div>

        <div class="card">
            <h3>Ongoing</h3>
            <p id="ongoingProjects">0</p>
        </div>

        <div class="card">
            <h3>Completed</h3>
            <p id="completedProjects">0</p>
        </div>

    </div>

    <div class="project-form">

        <h2>Add New Project</h2>

        <form id="projectForm">

            <input
                type="text"
                id="name"
                placeholder="Project Name"
                required>

            <input
                type="text"
                id="description"
                placeholder="Project Description"
                required>

            <select id="status">
                <option value="Pending">Pending</option>
                <option value="Ongoing">Ongoing</option>
                <option value="Completed">Completed</option>
            </select>

            <button type="submit">
                Add Project
            </button>

        </form>

    </div>

    <div id="projectTable" class="project-grid"></div>

</main>
```

</div>

<script>

const API_URL =
"https://project-management-system-twzj.onrender.com";

let projects = [];

async function fetchProjects(){

    try{

        const response =
        await fetch(`${API_URL}/projects`);

        projects = await response.json();

        let html = "";

        let pending = 0;
        let ongoing = 0;
        let completed = 0;

        projects.forEach(project=>{

            if(project.status==="Pending") pending++;
            if(project.status==="Ongoing") ongoing++;
            if(project.status==="Completed") completed++;

            html += `
            <div class="project-card">

                <h3>${project.name}</h3>

                <p>${project.description}</p>

                <span class="status ${project.status.toLowerCase()}">
                    ${project.status}
                </span>

                <button
                    class="delete-btn"
                    onclick="deleteProject(${project.id})">
                    Delete
                </button>

            </div>
            `;
        });

        document.getElementById("projectTable").innerHTML = html;

        document.getElementById("totalProjects").innerText = projects.length;
        document.getElementById("pendingProjects").innerText = pending;
        document.getElementById("ongoingProjects").innerText = ongoing;
        document.getElementById("completedProjects").innerText = completed;

    }catch(error){

        console.error("Error fetching projects:", error);

    }
}

async function deleteProject(id){

    try{

        await fetch(
            `${API_URL}/projects/${id}`,
            {
                method:"DELETE"
            }
        );

        fetchProjects();

    }catch(error){

        console.error("Delete Error:", error);

    }
}

document.getElementById("projectForm")
.addEventListener("submit", async (e)=>{

    e.preventDefault();

    const name =
    document.getElementById("name").value;

    const description =
    document.getElementById("description").value;

    const status =
    document.getElementById("status").value;

    try{

        await fetch(
            `${API_URL}/projects`,
            {

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    name,
                    description,
                    status
                })

            }
        );

        document.getElementById("projectForm").reset();

        fetchProjects();

    }catch(error){

        console.error("Add Project Error:", error);

    }

});

fetchProjects();

</script>
</body>
</html>
